const makeIcon = (bkt, idx) => L.divIcon({
  className:'', html:'<div class="marker-pin '+bkt+'"><span class="num">'+idx+'</span></div>',
  iconSize:[22,22], iconAnchor:[11,22], popupAnchor:[0,-20]
});

const ageBadge = (age) => {
  if (age == null) return '';
  if (age > 76) return '<span class="badge b-red">'+age+'d OLD</span>';
  if (age > 30) return '<span class="badge b-yellow">'+age+'d</span>';
  return '<span class="badge b-green">'+age+'d FRESH</span>';
};

const approxBadge = (cs) => cs==='zip-approx' ? '<span class="badge b-approx">ZIP-APPROX</span>' : '';

  const navUrl = 'https://www.google.com/maps/dir/?api=1&destination=' + encodeURIComponent(r.addr + ', ' + r.city + ', AZ ' + r.zip);
  const tylerUrl = TYLER_BASE + r.permitId;
  const html = ''
    + '<div class="pop-h">' + r.addr + '</div>'
    + '<div class="pop-kv">' + r.city + ', AZ ' + r.zip + '</div>'
    + '<div class="pop-kv">' + statusBadge(r.st, r.bkt) + ' ' + ageBadge(r.age) + ' ' + approxBadge(r.cs) + '</div>'

    + '<div class="pop-kv"><b>Permit:</b> ' + r.p + '</div>'
    + '<div class="pop-kv"><b>Parcel:</b> ' + r.parcel + '</div>'
    + '<div class="pop-kv"><b>Applied:</b> ' + (r.apply||'-') + (r.issue ? ' · <b>Issued:</b> ' + r.issue : '') + '</div>'

  m.bindPopup(html);
  markers.push({m, bkt: r.bkt});
});

    p.classList.toggle('off', !visible[b]);
    markers.forEach(x => {
      if (visible[x.bkt]) x.m.addTo(map);
      else map.removeLayer(x.m);
    });
  });
});

document.getElementById('count').textContent = PERMITS.length + ' permits · tap a pin';
</script>
</body>
